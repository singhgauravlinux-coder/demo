apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bakery-uat
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bakery
  source:
    repoURL: "https://github.com/singhgauravlinux-coder/demo.git"   # <-- update to your fork/remote
    targetRevision: main
    path: charts/bakery
    helm:
      valueFiles:
        - values.yaml
        - values-uat.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: bakery-uat
  syncPolicy:
    # Fully automated: every commit CI makes to values-uat.yaml (new image
    # tag) is synced immediately, and ArgoCD self-heals any manual drift.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
