{{/*
Three interchangeable secret-sourcing modes, selected by
.Values.secretsManagement.mode — the Deployments always just read
`bakery-db-secret` / `razorpay-credentials` via secretKeyRef, so switching
modes never touches any Deployment template:

  helm-values       Chart renders the Secret objects directly from
                     .Values.secrets.* (this file). Only for local/manual
                     `helm install --set-string ...` testing — NOT used by
                     the ArgoCD-managed UAT/Prod environments, since ArgoCD
                     syncs only what's committed to git and nothing here
                     should ever be committed with real values.

  external-secrets   Chart renders ExternalSecret CRs instead (see
                     external-secrets.yaml) that pull real values from
                     Azure Key Vault / AWS Secrets Manager / Vault via the
                     External Secrets Operator. This is what values-uat.yaml
                     and values-prod.yaml use. No secret material ever
                     touches git or CI.

  pre-provisioned    Chart renders nothing. You (or a one-time bootstrap
                     script run by a human, outside of CI/CD) create
                     `bakery-db-secret` / `razorpay-credentials` in the
                     namespace directly. Use this if ESO isn't installed yet.
*/}}
{{- if eq .Values.secretsManagement.mode "helm-values" }}
{{- $ns := include "bakery.namespace" . -}}
{{- $pgUser := required "secrets.postgres.user is required" .Values.secrets.postgres.user -}}
{{- $pgPass := required "secrets.postgres.password is required (--set-string secrets.postgres.password=...)" .Values.secrets.postgres.password -}}
{{- $pgDb := required "secrets.postgres.db is required" .Values.secrets.postgres.db -}}
{{- $authSecret := required "secrets.authTokenSecret is required (--set-string secrets.authTokenSecret=...)" .Values.secrets.authTokenSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: bakery-db-secret
  namespace: {{ $ns }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ $pgUser | quote }}
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  POSTGRES_DB: {{ $pgDb | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@postgres:5432/%s" $pgUser $pgPass $pgDb | quote }}
  AUTH_TOKEN_SECRET: {{ $authSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: razorpay-credentials
  namespace: {{ $ns }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  keyId: {{ .Values.secrets.razorpay.keyId | default "" | quote }}
  keySecret: {{ .Values.secrets.razorpay.keySecret | default "" | quote }}
  webhookSecret: {{ .Values.secrets.razorpay.webhookSecret | default "" | quote }}
{{- end }}
{{- if and (eq .Values.secretsManagement.mode "helm-values") .Values.global.imagePullSecret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.imagePullSecret.name }}
  namespace: {{ include "bakery.namespace" . }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ required "secrets.dockerConfigJson is required when global.imagePullSecret.enabled=true" .Values.secrets.dockerConfigJson }}
{{- end }}
