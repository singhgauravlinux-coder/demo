{{- if eq .Values.secretsManagement.mode "helm-values" }}

apiVersion: v1
kind: Secret
metadata:
  name: bakery-db-secret
  namespace: {{ include "bakery.namespace" . }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  AUTH_TOKEN_SECRET: {{ .Values.secrets.authTokenSecret | quote }}
  DATABASE_URL: "postgresql://{{ .Values.secrets.postgresUser }}:{{ .Values.secrets.postgresPassword }}@postgres:5432/{{ .Values.secrets.postgresDb }}"

---
apiVersion: v1
kind: Secret
metadata:
  name: razorpay-credentials
  namespace: {{ include "bakery.namespace" . }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  keyId: {{ .Values.secrets.razorpay.keyId | quote }}
  keySecret: {{ .Values.secrets.razorpay.keySecret | quote }}
  webhookSecret: {{ .Values.secrets.razorpay.webhookSecret | quote }}

{{- end }}
