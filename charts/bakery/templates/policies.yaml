{{- $ns := include "bakery.namespace" . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.hpa }}
{{- if $svc.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetCPUUtilization | default 70 }}
---
{{- end }}
{{- end }}
{{- if $svc.pdb }}
{{- if $svc.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
spec:
  minAvailable: {{ $svc.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
---
{{- end }}
{{- end }}
{{- end }}
