{{- $ns := include "bakery.namespace" . -}}
{{- if .Values.adminer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: {{ $ns }}
  labels:
    app: adminer
    {{- include "bakery.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: adminer
          image: {{ .Values.adminer.image }}
          ports:
            - containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: postgres
            - name: ADMINER_DESIGN
              value: dracula
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.adminer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: {{ $ns }}
  labels:
    app: adminer
spec:
  selector:
    app: adminer
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
