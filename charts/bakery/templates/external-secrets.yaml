{{- if eq .Values.secretsManagement.mode "external-secrets" }}
{{- $ns := include "bakery.namespace" . -}}
{{- $es := .Values.secretsManagement.externalSecrets -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bakery-db-secret
  namespace: {{ $ns }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: bakery-db-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # DATABASE_URL is assembled in-cluster from the other keys — the
        # backend only needs to hold the three raw values below.
        DATABASE_URL: "postgresql://{{`{{ .POSTGRES_USER }}`}}:{{`{{ .POSTGRES_PASSWORD }}`}}@postgres:5432/{{`{{ .POSTGRES_DB }}`}}"
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ $es.dbSecret.remoteKeys.POSTGRES_USER | quote }}
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ $es.dbSecret.remoteKeys.POSTGRES_PASSWORD | quote }}
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ $es.dbSecret.remoteKeys.POSTGRES_DB | quote }}
    - secretKey: AUTH_TOKEN_SECRET
      remoteRef:
        key: {{ $es.dbSecret.remoteKeys.AUTH_TOKEN_SECRET | quote }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: razorpay-credentials
  namespace: {{ $ns }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: razorpay-credentials
    creationPolicy: Owner
  data:
    - secretKey: keyId
      remoteRef:
        key: {{ $es.paymentSecret.remoteKeys.keyId | quote }}
    - secretKey: keySecret
      remoteRef:
        key: {{ $es.paymentSecret.remoteKeys.keySecret | quote }}
    - secretKey: webhookSecret
      remoteRef:
        key: {{ $es.paymentSecret.remoteKeys.webhookSecret | quote }}
{{- if and .Values.global.imagePullSecret.enabled $es.imagePullSecret.remoteKey }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.global.imagePullSecret.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: {{ .Values.global.imagePullSecret.name }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: {{ $es.imagePullSecret.remoteKey | quote }}
{{- end }}
{{- end }}
