# UAT overrides — synced by ArgoCD (see argocd/uat-application.yaml).
#
# GitOps flow: GitHub Actions CI builds & pushes images, then commits the
# new `global.imageTag` into THIS file on the main branch (see
# .github/workflows/ci.yml, job `update-uat-image-tag`). ArgoCD's UAT
# Application auto-syncs on every change to this file — that auto-sync *is*
# the CD step, entirely outside of GitHub Actions.
#
# Secrets: mode is "external-secrets" — real values live in your secret
# backend (Azure Key Vault / AWS Secrets Manager / Vault), never in this
# file or in git. Fill in secretStoreRef.name and the remoteKeys paths below
# to match your backend, then apply argocd/*-secretstore.yaml once per
# cluster (not part of this chart).

global:
  envName: uat
  namespace: bakery-uat
  imageTag: "4ac7b08"
secretsManagement:
  mode: helm-values
secrets:
  postgresUser: postgres
  postgresPassword: postgres123
  postgresDb: bakery
  authTokenSecret: your-secret
  razorpay:
    keyId: bakery-uat-razorpay-key-id
    keySecret: bakery-uat-razorpay-key-secret
    webhookSecret: bakery-uat-razorpay-webhook-secret
resourcePresets:
  small:
    requests:
      cpu: 25m
      memory: 48Mi
    limits:
      cpu: 150m
      memory: 96Mi
